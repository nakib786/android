name: kilodrive
description: CRA Mileage Tracker
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  google_maps_flutter: ^2.15.0
  geolocator: ^14.0.2
  background_locator_2: ^2.0.6
  geocoding: ^4.0.0
  fl_chart: ^1.2.0
  pdf: ^3.11.0
  printing: ^5.13.0
  csv: ^7.2.0
  share_plus: ^12.0.1
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.4.0
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  intl: ^0.20.2
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  image_path_android: "assets/icons/android/playstore-icon.png"
  image_path_ios: "assets/icons/ios/iTunesArtwork@3x.png"
  adaptive_icon_background: "#FFFFF0"
  adaptive_icon_foreground: "assets/icons/android/mipmap-xxxhdpi/ic_launcher_foreground.png"
